name: URL monitor (HTTP)

on:
  schedule:
    - cron: '0 15 * * 0'
  workflow_dispatch:

concurrency:
  group: url-monitor
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run URL monitor
        shell: bash
        run: |
          set -eo pipefail
          set -u
          test -f go.mod
          test -f data.json
          go run . | tee url-monitor-report.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: url-monitor-report
          path: url-monitor-report.txt
          if-no-files-found: warn
